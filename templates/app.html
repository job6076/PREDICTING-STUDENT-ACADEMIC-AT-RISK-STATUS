<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Risk Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb; --primary-light: #3b82f6; --danger: #ef4444; --success: #10b981;
            --warn: #f59e0b; --purple: #8b5cf6; --orange: #f97316; --dark: #0f172a; --card: #1e293b;
            --card2: #162032; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); overflow: hidden; }
        .app-shell { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 240px; min-width: 240px; height: 100vh; background: var(--card2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .sidebar-brand { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
        .sidebar-brand .icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 10px; box-shadow: 0 0 20px rgba(37,99,235,.3); }
        .sidebar-brand h2 { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: .08em; color: var(--text); }
        .sidebar-brand p { font-size: 10px; color: var(--muted); margin-top: 2px; }
        .nav-section { padding: 16px 12px; flex: 1; }
        .nav-label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: all .15s; color: var(--muted); font-size: 13px; font-weight: 500; margin-bottom: 2px; user-select: none; }
        .nav-item:hover { background: rgba(37,99,235,.12); color: var(--text); }
        .nav-item.active { background: linear-gradient(135deg, rgba(37,99,235,.25), rgba(59,130,246,.15)); color: var(--primary-light); border: 1px solid rgba(37,99,235,.25); }
        .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
        .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
        .user-chip { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,.04); border-radius: 10px; }
        .user-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 10px; color: var(--muted); }
        .logout-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; transition: color .15s; }
        .logout-btn:hover { color: var(--danger); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--card2); flex-shrink: 0; }
        .page-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
        .topbar-actions { display: flex; gap: 8px; align-items: center; }
        .status-badge { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid; }
        .status-badge.trained { background: rgba(16,185,129,.1); color: #6ee7b7; border-color: rgba(16,185,129,.3); }
        .status-badge.untrained { background: rgba(239,68,68,.1); color: #fca5a5; border-color: rgba(239,68,68,.3); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .content-area { flex: 1; overflow-y: auto; padding: 24px; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; position: relative; overflow: hidden; transition: transform .15s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .stat-card.blue::before { background: var(--primary); } .stat-card.red::before { background: var(--danger); }
        .stat-card.green::before { background: var(--success); } .stat-card.yellow::before { background: var(--warn); }
        .stat-card.purple::before { background: var(--purple); } .stat-card.orange::before { background: var(--orange); }
        .stat-icon { font-size: 24px; margin-bottom: 12px; display: block; }
        .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); }
        .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500; }

        .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 20px; }
        .section-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .section-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
        .section-body { padding: 20px; }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); white-space: nowrap; }
        .data-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid rgba(51,65,85,.5); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: rgba(255,255,255,.02); }
        .table-wrap { overflow-x: auto; overflow-y: auto; max-height: 420px; }

        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-risk { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
        .badge-safe { background: rgba(16,185,129,.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,.3); }

        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 2px 8px rgba(37,99,235,.3); }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); color: white; box-shadow: 0 2px 8px rgba(16,185,129,.3); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; box-shadow: 0 2px 8px rgba(239,68,68,.3); }
        .btn-ghost { background: rgba(255,255,255,.06); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { background: rgba(255,255,255,.1); }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
        .btn-purple { background: linear-gradient(135deg, var(--purple), #7c3aed); color: white; }

        .form-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 10px 14px; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all .2s; }
        .form-control:focus { outline: none; border-color: var(--primary); background: rgba(37,99,235,.08); }
        .form-control::placeholder { color: var(--muted); }
        textarea.form-control { resize: vertical; min-height: 100px; }
        select.form-control option { background: var(--card); color: var(--text); }

        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.2); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 14px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 12px; min-width: 280px; max-width: 400px; animation: slideIn .3s ease; box-shadow: 0 8px 30px rgba(0,0,0,.4); color: white; }
        .toast.success { background: linear-gradient(135deg, #059669, #10b981); border: 1px solid rgba(16,185,129,.4); }
        .toast.error { background: linear-gradient(135deg, #dc2626, #ef4444); border: 1px solid rgba(239,68,68,.4); }
        .toast.info { background: linear-gradient(135deg, #2563eb, #3b82f6); border: 1px solid rgba(37,99,235,.4); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 2px 10px rgba(37,99,235,.3); }

        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
        .chart-title { font-size: 13px; font-weight: 700; margin-bottom: 16px; font-family: 'Syne', sans-serif; }
        canvas { max-height: 260px; }

        /* Student Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--card); border-radius: 16px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 24px; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .modal-close { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; line-height: 1; padding: 0; }
        .modal-close:hover { color: var(--danger); }
        .student-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
        .student-subtitle { font-size: 14px; color: var(--muted); margin-top: 4px; }
        .risk-score-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-left: 8px; }
        .risk-score-badge.high { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
        .risk-score-badge.low { background: rgba(16,185,129,.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,.3); }
        .section-divider { height: 1px; background: var(--border); margin: 20px 0; }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
        .metric-card { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
        .metric-value { font-size: 24px; font-weight: 700; color: var(--text); }
        .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }

        .action-section { margin-bottom: 24px; }
        .action-section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .action-section-title .icon { font-size: 18px; }
        .reasons-list { list-style: none; margin: 0; padding: 0; }
        .reasons-list li { padding: 8px 12px; background: rgba(239,68,68,.07); border-left: 3px solid var(--danger); margin-bottom: 8px; border-radius: 0 4px 4px 0; font-size: 13px; }

        .input-group { margin-bottom: 12px; }
        .input-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .input-field { width: 100%; padding: 8px 12px; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
        .input-field:focus { outline: none; border-color: var(--primary); }
        .button-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .button-group .btn { flex: 1; min-width: 120px; }

        /* Prediction Steps Styles */
        .prediction-steps-container {
            background: rgba(0, 0, 0, 0.2); padding: 20px; border-radius: 10px; margin-bottom: 20px; display: none;
        }
        .prediction-step {
            display: flex; align-items: center; gap: 12px; padding: 10px 0; color: var(--muted); font-size: 14px; font-weight: 500; transition: all 0.3s ease;
        }
        .prediction-step .step-icon {
            width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: var(--border); font-size: 12px; transition: all 0.3s ease;
        }
        .prediction-step.active {
            color: var(--text);
        }
        .prediction-step.active .step-icon {
            background: var(--accent); color: var(--dark); box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
        .prediction-step.completed {
            color: var(--success);
        }
        .prediction-step.completed .step-icon {
            background: var(--success); color: white;
        }

        @media (max-width: 768px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } .chart-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="icon">🎓</div>
                <h2>RISK PREDICTOR</h2>
                <p>Academic Analytics System</p>
            </div>
            <nav class="nav-section">
                <div class="nav-label">Main</div>
                <div class="nav-item active" onclick="showPage('dashboard')"><span class="nav-icon">📊</span> Dashboard</div>
                <div class="nav-item" onclick="showPage('source')"><span class="nav-icon">🗄️</span> Source Database</div>
                <div class="nav-item" onclick="showPage('train')"><span class="nav-icon">🧠</span> Train Model</div>
                <div class="nav-item" onclick="showPage('predict')"><span class="nav-icon">🎯</span> Predict Students</div>
                <div class="nav-label" style="margin-top:12px">Analytics & Actions</div>
                <div class="nav-item" onclick="showPage('analytics')"><span class="nav-icon">📈</span> Analytics</div>
                <div class="nav-item" onclick="showPage('email')"><span class="nav-icon">✉️</span> Email Center</div>
                <div class="nav-item" onclick="showPage('reports')"><span class="nav-icon">📋</span> Reports</div>
                <div class="nav-item" onclick="showPage('settings')"><span class="nav-icon">⚙️</span> Settings</div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-chip">
                    <div class="user-avatar">{{ username[0] }}</div>
                    <div class="user-info">
                        <div class="user-name">{{ username }}</div>
                        <div class="user-role">{{ role }}</div>
                    </div>
                    <button class="logout-btn" onclick="logout()" title="Logout">⏻</button>
                </div>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1 class="page-title" id="page-title">Dashboard</h1>
                <div class="topbar-actions">
                    <div class="status-badge untrained" id="model-status">
                        <div class="status-dot"></div>
                        <span id="model-status-text">Model Not Trained</span>
                    </div>
                </div>
            </header>
            <div class="content-area" id="content-area"></div>
        </main>
    </div>

    <!-- Student Detail Modal -->
    <div class="modal-overlay" id="student-modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script>
        // Global State
        let currentPage = 'dashboard';
        let allPredictions = [];
        let charts = {};
        let currentStudent = null;

        // Utility Functions
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        async function api(endpoint, method = 'GET', data = null) {
            const options = { method, headers: {'Content-Type': 'application/json'} };
            if (data) { options.body = JSON.stringify(data); }
            const response = await fetch(endpoint, options);
            return response.json();
        }

        function updateModelStatus() {
            api('/api/model/history').then(data => {
                const badge = document.getElementById('model-status');
                const text = document.getElementById('model-status-text');
                if (data.trained) { badge.className = 'status-badge trained'; text.textContent = 'Model Ready'; }
                else { badge.className = 'status-badge untrained'; text.textContent = 'Model Not Trained'; }
            });
        }

        function showPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(item => { item.classList.remove('active'); });
            const pageIndex = { dashboard: 0, source: 1, train: 2, predict: 3, analytics: 4, email: 5, reports: 6, settings: 7 };
            if (pageIndex[page] !== undefined) { document.querySelectorAll('.nav-item')[pageIndex[page]].classList.add('active'); }
            const titles = { dashboard: 'Dashboard Overview', source: 'LMS Source Database', train: 'Model Training Centre', predict: 'Student Risk Prediction', analytics: 'Advanced Analytics', email: 'Email Center', reports: 'Export Centre', settings: 'Settings' };
            document.getElementById('page-title').textContent = titles[page] || page;
            Object.values(charts).forEach(chart => chart.destroy()); charts = {};
            const loaders = { dashboard: loadDashboard, source: loadSource, train: loadTrain, predict: loadPredict, analytics: loadAnalytics, email: loadEmail, reports: loadReports, settings: loadSettings };
            if (loaders[page]) { loaders[page](); }
        }

        async function logout() { await api('/api/logout', 'POST'); window.location.href = '/'; }

        // Dashboard
        async function loadDashboard() {
            document.getElementById('content-area').innerHTML = '<div style="text-align:center;padding:48px"><div class="spinner"></div></div>';
            const stats = await api('/api/dashboard/stats');
            document.getElementById('content-area').innerHTML = `
                <div class="stat-grid">
                    <div class="stat-card blue"><span class="stat-icon">👥</span><div class="stat-value">${stats.total}</div><div class="stat-label">Total Students</div></div>
                    <div class="stat-card red"><span class="stat-icon">⚠️</span><div class="stat-value">${stats.at_risk}</div><div class="stat-label">At-Risk Students</div></div>
                    <div class="stat-card green"><span class="stat-icon">✓</span><div class="stat-value">${stats.safe}</div><div class="stat-label">Safe Students</div></div>
                    <div class="stat-card yellow"><span class="stat-icon">📈</span><div class="stat-value">${stats.accuracy}</div><div class="stat-label">Model Accuracy</div></div>
                    <div class="stat-card purple"><span class="stat-icon">📅</span><div class="stat-value">${stats.meetings}</div><div class="stat-label">Meetings Scheduled</div></div>
                    <div class="stat-card orange"><span class="stat-icon">🔔</span><div class="stat-value">${stats.alerts}</div><div class="stat-label">Alerts Sent</div></div>
                </div>
                <div class="section-card">
                    <div class="section-header"><div class="section-title">🏆 Top 10 Highest-Risk Students</div></div>
                    <div class="table-wrap">
                        <table class="data-table">
                            <thead><tr><th>#</th><th>Student ID</th><th>Risk Score</th><th>Status</th><th>Action</th></tr></thead>
                            <tbody>
                                ${stats.top10.length === 0 ? '<tr><td colspan="5" style="text-align:center;padding:24px">No predictions yet.</td></tr>' :
                                    stats.top10.map((student, i) => `
                                        <tr><td>${i + 1}</td><td style="font-weight:600">${student[0]}</td>
                                        <td><span style="color:var(--danger);font-weight:700">${(student[1] * 100).toFixed(1)}%</span></td>
                                        <td><span class="badge badge-risk">At-Risk</span></td>
                                        <td><button class="btn btn-sm btn-danger" onclick="showStudentDetail('${student[0]}')">⚡ Action</button></td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        // Source Database
        async function loadSource() {
            document.getElementById('content-area').innerHTML = `
                <div class="section-card" style="margin-bottom:20px">
                    <div class="section-header"><div class="section-title">🖥️ LMS Server Connection</div></div>
                    <div class="section-body">
                        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Simulating connection to external LMS database server.</p>
                        <div class="form-row">
                            <div class="form-group"><label>Host URL</label><input class="form-control" value="lms.university.ac.ke" disabled></div>
                            <div class="form-group"><label>Port</label><input class="form-control" value="3306" disabled></div>
                        </div>
                        <button class="btn btn-primary" onclick="extractLMSData()" id="extract-btn">🔌 Connect & Extract Data</button>
                        <div id="extract-status" style="font-size:13px;color:var(--muted);margin-top:10px"></div>
                    </div>
                </div>
                <div class="section-card"><div class="section-header"><div class="section-title">📊 Synced Records Preview</div></div><div id="lms-table-area">Loading...</div></div>`;
            loadLMSData();
        }

        async function extractLMSData() {
            const btn = document.getElementById('extract-btn'); const status = document.getElementById('extract-status');
            btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Connecting...'; status.textContent = 'Establishing connection...';
            try {

            document.getElementById('content-area').innerHTML = `

        async function runPrediction() {
            const btn = document.getElementById('pred-btn');
            const progress = document.getElementById('prediction-progress');
            const step1 = document.getElementById('step-1');
            const step2 = document.getElementById('step-2');
            const step3 = document.getElementById('step-3');
            const tableArea = document.getElementById('pred-table-area');

            // Reset UI
            tableArea.innerHTML = '';
            progress.style.display = 'block';
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Processing...';

            // Step 1: Initializing
            step1.className = 'prediction-step active';
            step1.querySelector('.step-icon').innerHTML = '●';

            // Simulate initialization delay
            await new Promise(r => setTimeout(r, 600));

            // Step 2: Behavior Analysis
            step1.className = 'prediction-step completed';
            step1.querySelector('.step-icon').innerHTML = '✓';
            step2.className = 'prediction-step active';
            step2.querySelector('.step-icon').innerHTML = '●';

            try {
                const result = await api('/api/predict', 'POST'); // Main API call

                // Step 3: Risk Calculation
                step2.className = 'prediction-step completed';
                step2.querySelector('.step-icon').innerHTML = '✓';
                step3.className = 'prediction-step active';
                step3.querySelector('.step-icon').innerHTML = '●';

                // Simulate calculation finalization
                await new Promise(r => setTimeout(r, 400));

                step3.className = 'prediction-step completed';
                step3.querySelector('.step-icon').innerHTML = '✓';

                // Finish
                progress.style.display = 'none';
                btn.disabled = false; btn.innerHTML = '▶ Run Prediction';

                if (!result.ok) { showToast(result.error, 'error'); return; }
                showToast(`${result.count} students analysed!`, 'success');
                allPredictions = result.data;
                filterPredictions('All');

            } catch (err) {
                progress.style.display = 'none';
                btn.disabled = false; btn.innerHTML = '▶ Run Prediction';
                showToast('Prediction failed', 'error');
            }
        }

        async function loadPredictions() {
            const result = await api('/api/predictions');
            if (result.ok && result.data.length) { allPredictions = result.data; filterPredictions('All'); }
        }

        function filterPredictions(type = 'All', event = null) {
            if (event) { document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); event.target.classList.add('active'); }
            const search = document.getElementById('pred-search').value.toLowerCase();
            const filtered = allPredictions.filter(student => {
                const matchType = (type === 'All') || (student.status === type);
                const matchSearch = student.student_id.toLowerCase().includes(search);
                return matchType && matchSearch;
            });
            renderPredictionTable(filtered);
        }

            const area = document.getElementById('pred-table-area');

                                <h3 style="font-family:'Syne',sans-serif;font-size:15px;margin-bottom:6px">Excel Workbook</h3>
                                <p style="font-size:12px;color:var(--muted);margin-bottom:16px">Formatted .xlsx.</p>
                                <button class="btn btn-success" onclick="downloadReport('excel')">Download</button>
                            </div>
                            <div style="flex:1;min-width:200px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center">
                                <div style="font-size:32px;margin-bottom:12px">📝</div>
                                <h3 style="font-family:'Syne',sans-serif;font-size:15px;margin-bottom:6px">Raw CSV Data</h3>
                                <p style="font-size:12px;color:var(--muted);margin-bottom:16px">Plain CSV.</p>
                                <button class="btn btn-primary" onclick="downloadReport('csv')">Download</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function toggleStudentInput() {
            const selected = document.querySelector('input[name="export-filter"]:checked').value;
            const container = document.getElementById('student-id-input-container');
            container.style.display = selected === 'Specific' ? 'block' : 'none';
        }

        async function downloadReport(type) {
            const filter = document.querySelector('input[name="export-filter"]:checked').value;
            let studentId = null;
            if (filter === 'Specific') {
                studentId = document.getElementById('report-student-id').value.trim();
                if (!studentId) { showToast('Please enter a Student ID', 'error'); return; }
            }

            if (type === 'pdf') {
                let url = `/api/report/download/pdf?filter=${filter}`;
                if (studentId) url += `&student_id=${studentId}`;
                window.open(url, '_blank');
                showToast('Download started', 'info');
            } else {
                const endpoint = type === 'excel' ? '/api/report/download/excel' : '/api/report/download/csv';
                const payload = { filter: filter };
                if (studentId) payload.student_id = studentId;
                try {
                    const response = await fetch(endpoint, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                    if (!response.ok) { showToast('Download failed', 'error'); return; }
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url;
                    a.download = type === 'excel' ? 'risk_report.xlsx' : 'risk_data.csv';
                    document.body.appendChild(a); a.click(); a.remove();
                    window.URL.revokeObjectURL(url);
                    showToast('Download started', 'info');
                } catch (err) { showToast('Download failed', 'error'); }
            }
        }

        // Settings
        function loadSettings() {
            document.getElementById('content-area').innerHTML = `<div class="section-card"><div class="section-header"><div class="section-title">⚙️ Settings</div></div>
                <div class="section-body"><p style="font-size:13px;color:var(--muted)">System configuration and user preferences.</p></div></div>`;
        }

        // Initialize
        updateModelStatus();
        showPage('dashboard');
    </script>
</body>
</html>
